services:
  app:
    container_name: ${NEXT_PUBLIC_SITE_CODE:-slot4_site}_app
    image: ${DEPLOY_IMAGE}
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-3020}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 5
